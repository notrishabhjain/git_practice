<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jain Kundali</title>
  <script src="./assets/jain-core.js"></script>
  <style>
    :root {
      --bg: #f6efe3;
      --paper: rgba(255, 251, 244, 0.95);
      --paper-strong: #fffaf2;
      --ink: #2f2419;
      --muted: #6e5b46;
      --line: #dccab2;
      --accent: #b65a1f;
      --accent-deep: #7a3813;
      --leaf: #476c49;
      --warn: #9a412a;
      --blue: #355d90;
      --shadow: 0 18px 46px rgba(72, 46, 19, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(255, 183, 94, 0.25), transparent 30%),
        radial-gradient(circle at right 12%, rgba(140, 103, 67, 0.13), transparent 24%),
        linear-gradient(180deg, #f4e9d8, var(--bg));
      min-height: 100vh;
    }

    .shell {
      max-width: 1360px;
      margin: 0 auto;
      padding: 18px;
    }

    .hero,
    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      right: -80px;
      bottom: -100px;
      background: radial-gradient(circle, rgba(182, 90, 31, 0.18), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.75rem;
      color: var(--accent-deep);
    }

    h1, h2, h3 {
      margin: 0;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(2rem, 5.8vw, 4.4rem);
      line-height: 0.92;
      margin-top: 10px;
      max-width: 820px;
    }

    .hero-text {
      max-width: 860px;
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.72;
    }

    .hero-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .lang-toggle {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .lang-toggle button,
    .nav button,
    .secondary-btn,
    .primary-btn {
      border-radius: 999px;
      border: 1px solid transparent;
      font: inherit;
      cursor: pointer;
      transition: 180ms ease;
    }

    .lang-toggle button,
    .nav button {
      background: #fff;
      color: var(--muted);
      border-color: var(--line);
      padding: 9px 14px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .lang-toggle button.active,
    .nav button.active {
      background: var(--accent-deep);
      border-color: var(--accent-deep);
      color: #fff;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 350px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 16px;
    }

    .panel {
      padding: 18px;
    }

    .panel h2 {
      font-size: 1.18rem;
      margin-bottom: 12px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: block;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .helper {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.6;
    }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      padding: 13px 16px;
      font-weight: 700;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), #d07835);
      color: #fff;
      box-shadow: 0 12px 28px rgba(182, 90, 31, 0.28);
    }

    .secondary-btn {
      background: rgba(182, 90, 31, 0.08);
      border-color: rgba(182, 90, 31, 0.16);
      color: var(--accent-deep);
    }

    .button-row {
      display: grid;
      gap: 10px;
    }

    .content {
      display: grid;
      gap: 16px;
    }

    .section {
      display: none;
    }

    .section.active {
      display: grid;
      gap: 16px;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .wide {
      grid-column: 1 / -1;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .stat {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--paper-strong);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 700;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(53, 93, 144, 0.08);
      color: var(--blue);
      font-size: 0.84rem;
    }

    .callout {
      border-radius: 18px;
      border: 1px solid var(--line);
      padding: 14px 16px;
      line-height: 1.68;
      background: rgba(71, 108, 73, 0.08);
    }

    .callout.warn {
      background: rgba(154, 65, 42, 0.08);
      color: #6f2c1b;
    }

    .callout.soft {
      background: rgba(53, 93, 144, 0.06);
      color: #26476d;
    }

    .muted {
      color: var(--muted);
      line-height: 1.7;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
    }

    th, td {
      padding: 11px 10px;
      text-align: left;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: var(--accent-deep);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .area-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .area-card,
    .house-card,
    .planet-card,
    .ritual-card {
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--paper-strong);
      padding: 16px;
    }

    .area-head,
    .planet-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .score {
      min-width: 78px;
      text-align: center;
      border-radius: 18px;
      padding: 8px 10px;
      background: rgba(182, 90, 31, 0.08);
      color: var(--accent-deep);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .progress-line {
      display: grid;
      gap: 5px;
    }

    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(182, 90, 31, 0.12);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #e1954b);
    }

    .subtle-list,
    .remedy-list {
      margin: 10px 0 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.66;
    }

    .house-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .house-meta,
    .planet-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(71, 108, 73, 0.09);
      color: var(--leaf);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .chip.warn {
      background: rgba(154, 65, 42, 0.08);
      color: var(--warn);
    }

    .chip.blue {
      background: rgba(53, 93, 144, 0.09);
      color: var(--blue);
    }

    .planet-grid,
    .ritual-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .planet-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      color: #fff;
      font-weight: 700;
      font-size: 0.86rem;
    }

    .cosmo {
      width: 100%;
      min-height: 390px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at center, rgba(255, 213, 134, 0.22), transparent 26%),
        linear-gradient(180deg, #fbf5ea, #f6eee1);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 34px 10px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.4);
    }

    @media (max-width: 1120px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }

    @media (max-width: 960px) {
      .section-grid,
      .area-grid,
      .planet-grid,
      .ritual-grid,
      .house-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .hero-row { flex-direction: column; }
      .shell { padding: 12px; }
      .hero, .panel { border-radius: 20px; }
    }
  </style>
</head>

  <div class="shell">

          <h1 id="heroTitle"></h1>

      <div class="nav" id="nav"></div>
    </section>

    <div class="layout">
      <aside class="sidebar">
        <section class="panel">

          <div class="stack">

            </div>
            <div class="helper" id="cityHelper"></div>
            <button class="primary-btn" id="generateBtn" type="button"></button>
            <div class="button-row">
              <button class="secondary-btn" id="pdfEnBtn" type="button"></button>
              <button class="secondary-btn" id="pdfHiBtn" type="button"></button>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2 id="guardTitle"></h2>
          <ul class="subtle-list" id="guardList"></ul>
        </section>
      </aside>

      <main class="content">
        <section class="panel" id="summaryPanel">
          <div class="empty" id="emptyState"></div>
        </section>

        <section class="section active" id="life"></section>
        <section class="section" id="houses"></section>
        <section class="section" id="planets"></section>
        <section class="section" id="timing"></section>
        <section class="section" id="rituals"></section>
        <section class="section" id="muhurta"></section>
        <section class="section" id="cosmology"></section>
        <section class="section" id="notes"></section>
      </main>
    </div>
  </div>

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9\u0900-\u097f]/g, "");
    }

    function resolveCity(input) {
      const needle = normalizeText(input);
      if (!needle) return null;
      const exact = CITY_DB.find((city) => {
        return [city.key, city.en, city.hi].some((value) => normalizeText(value) === needle);
      });
      if (exact) return exact;
      return CITY_DB.find((city) => {
        return [city.key, city.en, city.hi].some((value) => normalizeText(value).includes(needle) || needle.includes(normalizeText(value)));
      }) || null;
    }

    function populateCities() {
      qs("cityList").innerHTML = CITY_DB.map((city) => `<option value="${city.en.split(",")[0]}"></option>`).join("");

    function getNextMaha(chart) {
      const index = chart.dasha.dashas.findIndex((item) => item.lord === chart.dasha.current.lord && item.start.getTime() === chart.dasha.current.start.getTime());
      return chart.dasha.dashas[index + 1] || null;
    }

    function getHouseData(chart) {
      const nextMaha = getNextMaha(chart);
      const currentMahaPlanet = chart.planets.find((planet) => planet.key === chart.dasha.current.lord);
      const currentAntarPlanet = chart.planets.find((planet) => planet.key === chart.dasha.currentAntar.lord);
      const nextMahaPlanet = nextMaha ? chart.planets.find((planet) => planet.key === nextMaha.lord) : null;

      return Array.from({ length: 12 }, (_, index) => {
        const house = index + 1;
        const rashiIndex = (chart.lagnaIndex + index) % 12;
        const occupants = chart.planets.filter((planet) => planet.house === house);
        const aspectors = chart.planets.filter((planet) => planet.aspects.includes(house));
        const occupantStrength = occupants.length
          ? occupants.reduce((sum, planet) => sum + stateStrength(planet.state), 0) / occupants.length
          : 38;
        const aspectBonus = Math.min(20, aspectors.length * 4);
        const currentBonus =
          (currentMahaPlanet?.house === house ? 30 : 0) +
          (currentAntarPlanet?.house === house ? 18 : 0) +
          (currentMahaPlanet?.aspects.includes(house) ? 9 : 0) +
          (currentAntarPlanet?.aspects.includes(house) ? 6 : 0);
        const futureBonus =
          (nextMahaPlanet?.house === house ? 28 : 0) +
          (nextMahaPlanet?.aspects.includes(house) ? 8 : 0);
        const present = Math.min(100, Math.round(occupantStrength * 0.62 + aspectBonus + currentBonus));
        const future = Math.min(100, Math.round(occupantStrength * 0.55 + aspectBonus + futureBonus));

        return {
          house,
          rashiIndex,
          rashiName: JAIN.data.RASHI_SHORT[rashiIndex],
          occupants,
          occupantStrength: Math.round(occupantStrength),
          present,
          future,
          aspects: aspectors
        };
      });
    }

    function getAreaKeyForHouse(house) {
      if ([10, 6, 11, 2].includes(house)) return "career";
      if ([2, 11, 5, 9].includes(house)) return "wealth";
      if ([7, 4, 5].includes(house)) return "relationships";
      if ([1, 6, 8].includes(house)) return "health";
      if ([12, 9].includes(house)) return "spirituality";
      return "protection";
    }

    function getPracticalSupport(areaKey, chart) {
      const area = AREA_LIBRARY[areaKey];
      const relevantPlanets = chart.planets.filter((planet) => area.planets.includes(planet.key));
      const remedy = relevantPlanets.sort((a, b) => stateStrength(a.state) - stateStrength(b.state))[0]?.remedy;
      if (!remedy) return [];
      return remedy.jainAdaptation.slice(0, 2);
    }

    function buildLifeAreas(chart, houses) {
      const nextMaha = getNextMaha(chart);
      return Object.entries(AREA_LIBRARY).map(([key, area]) => {
        const relatedHouses = houses.filter((house) => area.houses.includes(house.house));
        const present = Math.round(relatedHouses.reduce((sum, house) => sum + house.present, 0) / relatedHouses.length);
        const future = Math.round(relatedHouses.reduce((sum, house) => sum + house.future, 0) / relatedHouses.length);
        const topNow = relatedHouses.slice().sort((a, b) => b.present - a.present)[0];
        const topFuture = relatedHouses.slice().sort((a, b) => b.future - a.future)[0];
        const data = area[activeLang];
        const presentText = present >= 58 ? data.presentGood : data.presentLow;
        const futureText = future >= 58 ? data.futureGood : data.futureLow;
        return {
          key,
          title: data.title,
          present,
          future,
          presentText,
          futureText,
          topNow,
          topFuture,
          remedyFocus: data.remedyFocus,
          ritual: area.ritual[activeLang],
          practical: getPracticalSupport(key, chart),
          currentReference: `${localizePlanet(chart.dasha.current.lord)} → ${t("houseWord")} ${topNow.house}`,
          futureReference: nextMaha ? `${localizePlanet(nextMaha.lord)} → ${t("houseWord")} ${topFuture.house}` : "-"
        };
      }).sort((a, b) => b.present - a.present);
    }

    function buildChartViewModel(chart) {
      const houses = getHouseData(chart);
      const lifeAreas = buildLifeAreas(chart, houses);
      const nextMaha = getNextMaha(chart);

      const planets = chart.planets.map((planet) => {
        const strength = stateStrength(planet.state);
        const nowScore = Math.min(100,
          Math.round(strength * 0.6 +
          (planet.key === chart.dasha.current.lord ? 28 : 0) +
          (planet.key === chart.dasha.currentAntar.lord ? 18 : 0)));
        const futureScore = Math.min(100,
          Math.round(strength * 0.56 +
          (planet.key === nextMaha?.lord ? 28 : 0)));
        const focusAreaKey = getAreaKeyForHouse(planet.house);
        return {
          ...planet,
          strength,
          nowScore,
          futureScore,
          focusAreaKey,
          focusAreaTitle: AREA_LIBRARY[focusAreaKey][activeLang].title
        };
      }).sort((a, b) => b.nowScore - a.nowScore);

      return { houses, lifeAreas, planets, nextMaha };
    }

      const el = qs(id);
      return !!el && el.dataset.renderState === "ok" && !!el.textContent.trim();

    function validateChartData(chart, vm) {
      const checks = [
        { key: "life", valid: Array.isArray(vm.lifeAreas) && vm.lifeAreas.length > 0 && sectionRenderedCleanly("life") },
        { key: "houses", valid: Array.isArray(vm.houses) && vm.houses.length === 12 && sectionRenderedCleanly("houses") },
        { key: "planets", valid: Array.isArray(vm.planets) && vm.planets.length === 9 && sectionRenderedCleanly("planets") },
        { key: "timing", valid: !!chart.dasha?.current && !!chart.panchang?.tithi && sectionRenderedCleanly("timing") },
        { key: "rituals", valid: Array.isArray(vm.lifeAreas) && vm.lifeAreas.every((area) => !!area.ritual) && sectionRenderedCleanly("rituals") },
        { key: "muhurta", valid: !!chart.input?.latitude && !!chart.input?.longitude && sectionRenderedCleanly("muhurta") },
        { key: "cosmology", valid: !!chart.cosmology?.visibleSun && !!chart.cosmology?.visibleMoon && sectionRenderedCleanly("cosmology") },
        { key: "notes", valid: Array.isArray(chart.notes) && chart.notes.length > 0 && sectionRenderedCleanly("notes") }
      ];
      return {
        checks,
        ok: checks.every((item) => item.valid)
      };
    }

    function polarPoint(radius, angleDeg, scale, cx, cy) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + Math.cos(angle) * radius * scale,
        y: cy + Math.sin(angle) * radius * scale
      };
    }

    function renderCosmologySection(chart) {
      const snap = chart.cosmology;
      const maxRadius = Math.max(snap.visibleSun.radius, snap.visibleMoon.radius);
      const scale = 150 / maxRadius;
      const center = { x: 250, y: 200 };
      const vs = polarPoint(snap.visibleSun.radius, snap.visibleSun.angle, scale, center.x, center.y);
      const vm = polarPoint(snap.visibleMoon.radius, snap.visibleMoon.angle, scale, center.x, center.y);
      const as = polarPoint(snap.antipodalSun.radius, snap.antipodalSun.angle, scale, center.x, center.y);
      const am = polarPoint(snap.antipodalMoon.radius, snap.antipodalMoon.angle, scale, center.x, center.y);

      qs("cosmology").innerHTML = `

          <article class="panel">
            <h2>${t("cosmologyTitle")}</h2>
            <p class="muted">${t("cosmologyText")}</p>

            </div>
          </article>

            <h2>${t("orbitNotes")}</h2>
            <div class="table-wrap">
              <table>
                <tbody>
                  ${COSMOLOGY_NOTES[activeLang].map((item) => `<tr><th>${escapeHtml(item.label)}</th><td>${escapeHtml(item.value)}</td></tr>`).join("")}
                </tbody>
              </table>
            </div>
          </article>

          <article class="panel wide">
            <div class="cosmo">
              <svg viewBox="0 0 500 400" width="100%" height="100%">
                <circle cx="250" cy="200" r="150" fill="none" stroke="rgba(121,54,15,0.15)" stroke-width="1.5"></circle>
                <circle cx="250" cy="200" r="130" fill="none" stroke="rgba(121,54,15,0.12)" stroke-width="1.5"></circle>
                <circle cx="250" cy="200" r="25" fill="#f2c16d" stroke="#b65a1f" stroke-width="2"></circle>
                <text x="250" y="205" text-anchor="middle" fill="#7a3813" font-size="15" font-weight="700">${t("meru")}</text>
                <circle cx="${vs.x}" cy="${vs.y}" r="11" fill="#c66112"></circle>
                <circle cx="${vm.x}" cy="${vm.y}" r="10" fill="#2f71c1"></circle>
                <circle cx="${as.x}" cy="${as.y}" r="11" fill="rgba(198,97,18,0.35)"></circle>
                <circle cx="${am.x}" cy="${am.y}" r="10" fill="rgba(47,113,193,0.35)"></circle>
                <text x="${vs.x + 14}" y="${vs.y - 8}" fill="#7a3813" font-size="13">${t("visibleSun")}</text>
                <text x="${vm.x + 14}" y="${vm.y - 8}" fill="#25446d" font-size="13">${t("visibleMoon")}</text>
                <text x="${as.x + 14}" y="${as.y - 8}" fill="#9a6a44" font-size="12">${t("antipodalSun")}</text>
                <text x="${am.x + 14}" y="${am.y - 8}" fill="#5b80ac" font-size="12">${t("antipodalMoon")}</text>

      safeRenderSection("planets", () => renderPlanetSection(vm));
      safeRenderSection("timing", () => renderTimingSection(currentChart, vm));
      safeRenderSection("rituals", () => renderRitualSection(vm));
      safeRenderSection("muhurta", () => renderMuhurtaSection(currentChart));

      safeRenderSection("notes", () => renderNotesSection(currentChart));
      renderSummary(currentChart, vm);
      showSection(activeSection);

    function generate() {
      const input = getInput();
      if (!input || !input.date || !input.time) {
        alert(t("unresolvedCity"));
        return;
      }
      currentChart = JAIN.astro.buildChart(input);
      renderAll();
    }

    function buildPrintableHtml(lang) {
      const previousLang = activeLang;
      activeLang = lang;
      renderAll();
      const title = lang === "hi" ? "जैन कुण्डली" : "Jain Kundali";
      const summary = qs("summaryPanel").innerHTML;
      const sectionsHtml = sections.map((section) => `
        <section class="print-section">
          <h2>${escapeHtml(t(`nav.${section.key}`))}</h2>
          ${qs(section.id).innerHTML}
        </section>
      `).join("");
      const html = `
        <!DOCTYPE html>
        <html lang="${lang}">
        <head>
          <meta charset="UTF-8">
          <title>${title}</title>
          <style>
            body { font-family: Georgia, "Times New Roman", serif; margin: 0; color: #2f2419; background: #fff; }
            main { max-width: 980px; margin: 0 auto; padding: 28px 24px 40px; }
            h1, h2, h3 { margin: 0; }
            h1 { font-size: 34px; margin-bottom: 10px; }
            h2 { font-size: 24px; margin-bottom: 14px; color: #7a3813; }
            p, li, td, th, div { line-height: 1.55; }
            .panel, .area-card, .house-card, .planet-card, .ritual-card, .callout, .stat { border: 1px solid #dccab2; border-radius: 14px; padding: 12px; margin-bottom: 12px; background: #fffaf2; }
            .stats, .area-grid, .planet-grid, .ritual-grid, .section-grid, .house-grid { display: block; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border-bottom: 1px solid #e5d7c5; padding: 8px; text-align: left; vertical-align: top; }
            .badge, .chip { display: inline-block; border: 1px solid #dccab2; border-radius: 999px; padding: 4px 8px; margin: 0 6px 6px 0; }
            .progress-track { height: 8px; background: #eedcc7; border-radius: 999px; overflow: hidden; margin-top: 6px; }
            .progress-fill { height: 100%; background: #b65a1f; }
            .print-section { page-break-inside: avoid; margin-top: 24px; }
          </style>
        </head>
        <body>
          <main>
            <h1>${title}</h1>
            <section class="print-section">${summary}</section>
            ${sectionsHtml}
          </main>
        </body>
        </html>
      `;
      activeLang = previousLang;
      renderAll();
      return html;
    }

    function exportPdf(lang) {
      if (!currentChart) {
        alert(t("exportNeedsChart"));
        return;
      }
      alert(t("exportPreparing"));
      const printWindow = window.open("", "_blank");
      if (!printWindow) return;
      printWindow.document.open();
      printWindow.document.write(buildPrintableHtml(lang));
      printWindow.document.close();
      setTimeout(() => {
        printWindow.focus();
        printWindow.print();
      }, 500);
    }

    qs("langEn").addEventListener("click", () => {
      activeLang = "en";
      renderAll();
    });

    qs("langHi").addEventListener("click", () => {
      activeLang = "hi";
      renderAll();
    });

    qs("generateBtn").addEventListener("click", generate);
    qs("pdfEnBtn").addEventListener("click", () => exportPdf("en"));
    qs("pdfHiBtn").addEventListener("click", () => exportPdf("hi"));

    populateCities();
    renderAll();
    generate();
  </script>
